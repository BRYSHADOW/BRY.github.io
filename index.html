<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HACKBORY | Link Hub Premium</title>
    
    <!-- SEO & Meta Tags -->
    <meta name="description" content="HACKBORY - Ultra Premium Link Hub">
    <meta name="keywords" content="Bô Ry, Hackbory, Link Hub, Cyberpunk, Portfolio">
    <meta name="author" content="Bô Ry">
    <meta name="theme-color" content="#0f0f1a">
    
    <!-- Open Graph / Twitter -->
    <meta property="og:title" content="HACKBORY X">
    <meta property="og:description" content="Premium Link Hub">
    <meta property="og:type" content="website">
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/avatar.png">
    
    <!-- Assets -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading" class="loading-screen">
        <div class="glitch-text" data-text="INITIALIZING...">INITIALIZING...</div>
        <div class="progress-bar"><div class="progress"></div></div>
    </div>

    <!-- Background Elements -->
    <canvas id="matrix-canvas"></canvas>
    <div class="bg-overlay"></div>
    <div class="cursor-glow"></div>

    <!-- Main Container -->
    <main class="glass-container rgb-border fade-in">
        <!-- Header Profile -->
        <header class="profile">
            <div class="avatar-container float-anim">
                <img id="avatar-img" src="" alt="Avatar">
                <div class="status-indicator"></div>
            </div>
            <h1 class="display-name neon-text">
                <span id="display-name"></span>
                <svg id="verified-badge" class="verified" viewBox="0 0 24 24" fill="#00ffcc" width="24" height="24" style="display:none"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-1.9 14.7L6 12.6l1.5-1.5 2.6 2.6 6.4-6.4 1.5 1.5-7.9 7.9z"/></svg>
            </h1>
            <p id="username" class="username glow-text"></p>
            <p id="bio" class="bio typing-effect"></p>
        </header>

        <!-- Dynamic Info -->
        <div class="info-bar">
            <span id="clock" class="digital-clock">00:00:00</span>
            <span class="visitor-counter">VISITORS: <span id="visits">0</span></span>
        </div>

        <!-- Social Icons -->
        <nav id="social-container" class="social-links"></nav>

        <!-- Link Cards -->
        <section id="links-container" class="links-grid"></section>

        <!-- Audio Player & Playlist Nâng Cấp (ĐÃ CÓ ĐẦY ĐỦ ID) -->
        <section class="audio-player glass-blur rgb-border">
            <div class="track-info">
                <span id="music-icon" class="music-icon float-anim">🎵</span>
                <div class="track-title-wrapper">
                    <span id="track-title" class="track-title neon-text-small">Chưa phát nhạc...</span>
                </div>
            </div>
            
            <div class="player-controls">
                <button id="prev-btn" class="ctrl-btn" title="Bài trước">⏮</button>
                <button id="music-btn" class="magnetic-btn">▶ Bật Nhạc</button>
                <button id="next-btn" class="ctrl-btn" title="Bài tiếp">⏭</button>
                
                <!-- Nút chế độ Lặp lại -->
                <button id="loop-btn" class="ctrl-btn" title="Chế độ: Lặp toàn bộ danh sách">🔁</button>

                <!-- Nút Mở bảng chọn bài trong List -->
                <button id="playlist-btn" class="ctrl-btn" title="Mở danh sách nhạc">📜</button>

                <!-- Nút Khách tự chọn file MP3 từ máy của họ -->
                <label for="custom-file-input" class="ctrl-btn custom-upload-btn" title="Tự chọn nhạc từ máy bạn">📂</label>
                <input type="file" id="custom-file-input" accept="audio/*" style="display: none;">
            </div>

            <div class="volume-container">
                <span>🔊</span>
                <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.5">
            </div>

            <!-- Bảng Danh Sách Nhạc -->
            <div id="playlist-modal" class="playlist-modal glass-blur" style="display: none;">
                <div class="playlist-header">
                    <h3>📜 DANH SÁCH BÀI HÁT (<span id="track-count">0</span>)</h3>
                    <button id="close-playlist" class="close-btn">✖</button>
                </div>
                <ul id="playlist-list" class="playlist-list"></ul>
            </div>
        </section>

        <!-- Footer -->
        <footer>
            <p>&copy; <span id="year"></span> HACKBORY. Version <span id="version"></span></p>
        </footer>
    </main>

    <!-- Core Scripts -->
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
